<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1"/>
<title>Payvoice</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#c9973a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Payvoice"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04040d;--surface:#09091a;--surface2:#0e0e22;
  --border:rgba(255,255,255,0.06);
  --gold:#c9973a;--gold-dim:rgba(201,151,58,0.12);--gold-glow:rgba(201,151,58,0.25);
  --text:#e8e3d8;--sub:#94a3b8;--muted:#4a4a6a;
  --danger:#e05252;--warn:#d4883a;--ok:#4aab7a;
  --font-display:'Cormorant Garamond',serif;--font-body:'Figtree',sans-serif;
}
body.light{
  --bg:#f7f2e8;--surface:#ffffff;--surface2:#ede8de;
  --border:rgba(0,0,0,0.08);
  --gold:#a0720a;--gold-dim:rgba(160,114,10,0.1);--gold-glow:rgba(160,114,10,0.2);
  --text:#1a1408;--sub:#6b7280;--muted:#9c8860;
  --danger:#c0392b;--warn:#c07030;--ok:#276748;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden;transition:background .25s,color .25s}
button{font-family:var(--font-body);cursor:pointer;border:none;outline:none;transition:all .15s}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--surface2)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}
body.light::before{opacity:.15}
.bg-glow{position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:60vw;height:40vh;
  background:radial-gradient(ellipse,rgba(201,151,58,0.06) 0%,transparent 70%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 0;flex-shrink:0;gap:6px}
.logo{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--gold);letter-spacing:1px;flex-shrink:0}
.logo span{color:var(--text);font-weight:300}
.hcontrols{display:flex;align-items:center;gap:5px}
.icon-btn{width:32px;height:32px;border-radius:8px;background:var(--surface);border:1px solid var(--border);
  color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon-btn:hover,.lang-btn:hover{border-color:var(--gold);color:var(--gold)}
.lang-btn{height:32px;padding:0 9px;border-radius:8px;background:var(--surface);border:1px solid var(--border);
  color:var(--muted);font-size:10px;font-weight:800;letter-spacing:.5px;flex-shrink:0}
.total-pill{background:var(--gold-dim);border:1px solid rgba(201,151,58,0.2);border-radius:20px;padding:5px 11px;text-align:right;flex-shrink:0}
.total-pill .lbl{font-size:8px;color:var(--muted);display:block;text-transform:uppercase;letter-spacing:.8px}
.total-pill .amt{font-family:var(--font-display);font-size:16px;color:var(--gold);font-weight:700}

/* MIC BANNER */
#mic-banner{display:none;margin:6px 18px 0;padding:10px 14px;
  background:rgba(224,82,82,0.08);border:1px solid rgba(224,82,82,0.2);
  border-radius:10px;font-size:11px;color:var(--danger);line-height:1.5;text-align:center}
#mic-banner a{color:var(--gold);font-weight:700}

/* INSTALL BANNER */
#install-banner{display:none;margin:6px 18px 0;padding:8px 14px;
  background:var(--gold-dim);border:1px solid rgba(201,151,58,0.25);
  border-radius:10px;align-items:center;gap:8px}
#install-banner.show{display:flex}
.install-btn{padding:5px 12px;background:var(--gold);border-radius:6px;color:#fff;font-size:11px;font-weight:800;flex-shrink:0}
.install-close{color:var(--muted);font-size:18px;background:none;border:none;cursor:pointer;flex-shrink:0;line-height:1}

/* VOICE STAGE */
#voice-stage{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:14px 0 6px}
.orb-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:110px;height:110px}
.orb-ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(201,151,58,0.15);animation:ringBreath 4s ease-in-out infinite}
.orb-ring:nth-child(2){inset:-11px;border-color:rgba(201,151,58,0.07);animation-delay:1s}
.orb-ring:nth-child(3){inset:-22px;border-color:rgba(201,151,58,0.04);animation-delay:2s}
@keyframes ringBreath{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.04);opacity:.6}}
.orb{width:80px;height:80px;border-radius:50%;
  background:radial-gradient(circle at 38% 38%,var(--surface2),var(--bg));
  border:1.5px solid rgba(201,151,58,0.3);
  box-shadow:0 0 40px rgba(201,151,58,0.1),inset 0 0 20px rgba(0,0,0,0.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;z-index:1;-webkit-tap-highlight-color:transparent}
.orb.listening{border-color:var(--gold);animation:orbPulse .8s ease-in-out infinite alternate;
  box-shadow:0 0 0 4px var(--gold-glow),0 0 60px rgba(201,151,58,0.3)}
@keyframes orbPulse{from{box-shadow:0 0 0 4px var(--gold-glow),0 0 40px rgba(201,151,58,0.2)}
  to{box-shadow:0 0 0 10px rgba(201,151,58,0.06),0 0 80px rgba(201,151,58,0.3)}}
.orb.processing{animation:orbSpin 1.5s linear infinite}
@keyframes orbSpin{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}
.orb-icon{font-size:28px;user-select:none}
#wave{display:flex;align-items:center;gap:3px;height:24px;opacity:0;transition:opacity .3s;margin-top:4px}
#wave.active{opacity:1}
.wbar{width:3px;border-radius:2px;background:var(--gold);animation:waveAnim .6s ease-in-out infinite alternate}
.wbar:nth-child(1){animation-delay:0s}.wbar:nth-child(2){animation-delay:.05s}.wbar:nth-child(3){animation-delay:.1s}
.wbar:nth-child(4){animation-delay:.15s}.wbar:nth-child(5){animation-delay:.2s}.wbar:nth-child(6){animation-delay:.15s}
.wbar:nth-child(7){animation-delay:.1s}.wbar:nth-child(8){animation-delay:.05s}.wbar:nth-child(9){animation-delay:0s}
@keyframes waveAnim{from{height:4px;opacity:.4}to{height:20px;opacity:1}}
#status-msg{font-size:12px;color:var(--muted);margin-top:6px;min-height:16px;text-align:center}
#transcript{font-family:var(--font-display);font-size:14px;color:var(--gold);font-style:italic;
  text-align:center;margin:3px 24px 0;min-height:18px;opacity:0;transition:opacity .3s;line-height:1.4}
#transcript.show{opacity:1}
.examples{display:flex;gap:5px;margin-top:8px;padding:0 18px;flex-wrap:wrap;justify-content:center}
.ex-chip{font-size:10px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-style:italic}

/* TABS */
#tabs{display:flex;padding:10px 18px 0;flex-shrink:0;border-bottom:1px solid var(--border);margin:0 18px}
.tab{flex:1;padding:7px 4px 9px;background:transparent;color:var(--muted);font-size:11px;
  font-weight:700;letter-spacing:.3px;border-bottom:2px solid transparent;text-transform:uppercase}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:12px 18px 24px}

/* TIMELINE */
.timeline-item{display:flex;gap:10px;margin-bottom:10px;animation:fadeUp .22s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.tl-line{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding-top:4px}
.tl-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid;flex-shrink:0}
.tl-bar{width:1px;flex:1;background:var(--border);margin-top:4px}
.tl-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:11px 13px}
.tl-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.tl-type{font-size:9px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:4px}
.tl-urg{font-size:11px;font-weight:700}
.tl-main{display:flex;justify-content:space-between;align-items:baseline}
.tl-creditor{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--text)}
.tl-amount{font-family:var(--font-display);font-size:19px;font-weight:700;color:var(--gold)}
.tl-meta{display:flex;gap:9px;margin-top:3px;font-size:10px;color:var(--muted);flex-wrap:wrap}
.tl-note{font-size:11px;color:var(--muted);font-style:italic;margin-top:3px}
.tl-actions{display:flex;gap:6px;margin-top:9px}
.btn-paid{flex:1;padding:6px;font-size:11px;font-weight:800;background:rgba(74,171,122,0.07);
  border:1px solid rgba(74,171,122,0.2);border-radius:7px;color:var(--ok)}
.btn-del{padding:6px 10px;font-size:12px;background:rgba(224,82,82,0.06);
  border:1px solid rgba(224,82,82,0.15);border-radius:7px;color:var(--danger)}
.section-label{font-size:9px;color:var(--muted);font-weight:800;letter-spacing:1.2px;
  text-transform:uppercase;margin:18px 0 9px;border-top:1px solid var(--border);padding-top:14px}
.paid-row{display:flex;align-items:center;gap:8px;padding:7px 10px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:5px;opacity:.4}
.paid-row .pc{flex:1;font-size:12px;text-decoration:line-through;color:var(--muted)}
.paid-row .pa{font-family:var(--font-display);font-size:13px;color:var(--muted);margin-right:6px}
.empty{text-align:center;padding:36px 0;color:var(--muted);font-size:14px;white-space:pre-line}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav{width:32px;height:32px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;color:var(--muted);font-size:17px;display:flex;align-items:center;justify-content:center}
.cal-title{font-family:var(--font-display);font-size:19px;font-weight:700;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:8px;color:var(--muted);font-weight:800;padding:3px 0;text-transform:uppercase}
.cal-day{background:var(--surface);border:1px solid var(--border);border-radius:5px;min-height:46px;padding:2px}
.cal-day.today{border-color:rgba(201,151,58,0.35);background:var(--gold-dim)}
.cal-num{font-size:9px;color:var(--muted);text-align:right;line-height:1.5;padding-right:2px}
.today .cal-num{color:var(--gold);font-weight:800}
.cal-event{border-radius:3px;padding:1px 3px;margin-top:2px;overflow:hidden}
.cal-event-txt{font-size:7px;font-weight:800;color:#000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.cal-legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* SUGGESTIONS */
.sug-btn{width:100%;padding:11px;margin-bottom:12px;background:var(--gold-dim);
  border:1px solid rgba(201,151,58,0.2);border-radius:10px;color:var(--gold);font-size:13px;font-weight:800}
.sug-btn:disabled{opacity:.5;cursor:not-allowed}
.sug-skeleton{height:2px;background:var(--surface2);border-radius:2px;margin-bottom:12px;overflow:hidden}
.sug-fill{height:100%;width:30%;background:var(--gold);animation:skelSlide 1.4s ease-in-out infinite;border-radius:2px}
@keyframes skelSlide{0%{margin-left:-30%}100%{margin-left:130%}}
.sug-box{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:16px}
.sug-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid var(--border)}
.sug-title{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text)}
.sug-line{font-size:13px;color:var(--sub);line-height:1.7;margin-bottom:2px}
.sug-line.head{color:var(--text);font-weight:700;margin-top:10px}

/* MODAL */
#modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:100;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
#modal-bg.open{display:flex}
#modal{width:100%;max-width:480px;margin:0 auto;background:var(--surface2);
  border-top:1px solid var(--border);border-radius:20px 20px 0 0;
  padding:22px 18px 34px;animation:slideUp .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:var(--font-display);font-size:19px;font-weight:700;color:var(--text);margin-bottom:14px}
.form-row{margin-bottom:10px}
.form-label{font-size:10px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.form-input,.form-select{width:100%;padding:9px 11px;background:var(--surface);
  border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none}
.form-input:focus,.form-select:focus{border-color:rgba(201,151,58,0.4)}
.form-select option{background:var(--surface2)}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.btn-cancel{flex:1;padding:10px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;font-weight:700}
.btn-save{flex:2;padding:10px;background:var(--gold-dim);border:1px solid rgba(201,151,58,0.3);border-radius:8px;color:var(--gold);font-size:13px;font-weight:800}

/* TOAST */
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);
  padding:9px 18px;border-radius:8px;color:#fff;font-size:12px;font-weight:800;
  z-index:999;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,0.4);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div id="toast"></div>

<div id="install-banner">
  <span style="flex:1;font-size:11px;color:var(--gold);font-weight:600" id="install-txt">Add Payvoice to home screen</span>
  <button class="install-btn" onclick="installPWA()">Install</button>
  <button class="install-close" onclick="this.parentElement.classList.remove('show')">×</button>
</div>

<div id="modal-bg">
  <div id="modal">
    <div class="modal-title" id="modal-title">Add Debt</div>
    <div class="form-row">
      <label class="form-label" id="lbl-type">Type</label>
      <select class="form-select" id="m-type">
        <option value="credit_card">💳 Credit Card</option>
        <option value="cash">💵 Cash</option>
        <option value="installment">📦 Installment</option>
        <option value="bill">🧾 Bill</option>
        <option value="personal">🤝 Personal</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label" id="lbl-creditor">Creditor / Person</label>
      <input class="form-input" id="m-creditor" placeholder="e.g. Akbank, Ali"/>
    </div>
    <div class="form-row-2">
      <div><label class="form-label" id="lbl-amount">Amount</label><input class="form-input" id="m-amount" type="number" placeholder="0"/></div>
      <div><label class="form-label" id="lbl-cur">Currency</label>
        <select class="form-select" id="m-currency">
          <option value="₺">₺ TRY</option><option value="$">$ USD</option>
          <option value="€">€ EUR</option><option value="£">£ GBP</option>
        </select>
      </div>
    </div>
    <div class="form-row"><label class="form-label" id="lbl-due">Due Date</label><input class="form-input" id="m-due" type="date"/></div>
    <div class="form-row-2" id="inst-row" style="display:none">
      <div><label class="form-label" id="lbl-tinst">Total Inst.</label><input class="form-input" id="m-total-inst" type="number" placeholder="12"/></div>
      <div><label class="form-label" id="lbl-rinst">Remaining</label><input class="form-input" id="m-rem-inst" type="number" placeholder="7"/></div>
    </div>
    <div class="form-row"><label class="form-label" id="lbl-note">Note</label><input class="form-input" id="m-note" placeholder="optional"/></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="saveManual()">Save</button>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">Pay<span>voice</span></div>
    <div class="hcontrols">
      <button class="lang-btn" id="lang-btn" onclick="toggleLang()">TR</button>
      <button class="icon-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="icon-btn" onclick="openModal()" style="font-size:16px;font-weight:700">＋</button>
      <div class="total-pill">
        <span class="lbl" id="lbl-total-pill">TOTAL DUE</span>
        <span class="amt" id="total-display">—</span>
      </div>
    </div>
  </header>

  <div id="mic-banner"></div>

  <div id="voice-stage">
    <div class="orb-wrap">
      <div class="orb-ring"></div><div class="orb-ring"></div><div class="orb-ring"></div>
      <div class="orb" id="orb" onclick="toggleListen()"><div class="orb-icon" id="orb-icon">🎙️</div></div>
    </div>
    <div id="wave">
      <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
      <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
      <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
    </div>
    <div id="status-msg"></div>
    <div id="transcript"></div>
    <div class="examples" id="examples">
      <div class="ex-chip" id="ex1"></div>
      <div class="ex-chip" id="ex2"></div>
    </div>
  </div>

  <div id="tabs">
    <button class="tab active" id="tab-debts" onclick="setTab('debts',this)"></button>
    <button class="tab" id="tab-calendar" onclick="setTab('calendar',this)"></button>
    <button class="tab" id="tab-suggest" onclick="setTab('suggest',this)"></button>
  </div>
  <div id="content"></div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx4GtH4-ZIPOPpm_U5FNxXY1LZ5RddjQy1AwEZQP3r7dfOxLUv7FWqKKxErD44GdPvs/exec';
const CLAUDE_API = 'https://api.anthropic.com/v1/messages';

// ── I18N ──
const L = {
  en:{
    status_idle:'Tap the orb and speak your debt',
    status_listen:'Listening...',status_process:'Understanding...',status_none:'Could not hear, try again',
    tab_debts:'Debts',tab_cal:'Calendar',tab_sug:'AI Advice',
    total:'TOTAL DUE',
    empty:'No debts yet.\nTap the orb and speak 🎙️',
    paid_sec:'Paid',btn_paid:'✓ Paid',btn_del:'🗑',
    sug_btn:'✦ Get AI Advice',sug_ing:'⏳ Analyzing...',sug_tap:'Tap above for payment advice',
    ex1:'"Akbank card 3200 lira 15th"',ex2:'"Owe Ali 500 end of month"',
    d_over:'d overdue ⚠️',d_today:'Due Today!',d_tom:'Tomorrow!',d_few:' days 🔥',d_more:' days',
    recur:'🔁 Recurring',inst_lbl:'📦 inst.',
    modal_t:'Add Debt',l_type:'Type',l_cred:'Creditor / Person',l_amt:'Amount',l_cur:'Currency',
    l_due:'Due Date',l_tinst:'Total Inst.',l_rinst:'Remaining',l_note:'Note',
    cancel:'Cancel',save:'Save',
    t_added:'Debt added!',t_paid:'✓ Marked as paid',t_del:'Deleted',t_fill:'Fill required fields',
    t_err:'Could not understand, try again',t_sync:'Sync error',
    mic_https:'🎙️ Mic needs HTTPS. <a href="https://pages.github.com" target="_blank">Host on GitHub Pages</a> for voice on mobile.',
    mic_denied:'Mic access denied. Allow mic in browser settings.',
    mic_none:'Voice not supported. Use Chrome or Edge.',
    install_txt:'Add Payvoice to home screen',
    opt:['💳 Credit Card','💵 Cash','📦 Installment','🧾 Bill','🤝 Personal'],
    type_lbl:['Credit Card','Cash','Installment','Bill','Personal'],

const TYPE_VALS = ['credit_card','cash','installment','bill','personal'];

let isLight = localStorage.getItem('pv-theme')==='light';
let debts=[], currentTab='debts', recognition=null, isListening=false;
let calMonth=new Date(), suggestions='', deferredInstall=null;

// ── INIT ──
async function init(){
  if(isLight){document.body.classList.add('light');document.getElementById('theme-btn').textContent='☀️';}
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();deferredInstall=e;
    document.getElementById('install-banner').classList.add('show');
  });
  window.addEventListener('appinstalled',()=>document.getElementById('install-banner').classList.remove('show'));
  if('Notification' in window && Notification.permission==='default') Notification.requestPermission();
  await loadDebts();
  applyLang();
}
async function installPWA(){
  if(!deferredInstall)return;
  deferredInstall.prompt();
  const{outcome}=await deferredInstall.userChoice;
  if(outcome==='accepted')document.getElementById('install-banner').classList.remove('show');
  deferredInstall=null;
}

// ── DATA ──
async function loadDebts(){
  if(!SCRIPT_URL||SCRIPT_URL==='YOUR_APPS_SCRIPT_URL_HERE'){debts=sample();updateTotal();return;}
  try{const r=await fetch(SCRIPT_URL+'?action=getAll');debts=await r.json();updateTotal();}
  catch{showToast(t('t_sync'),'error');debts=sample();updateTotal();}
}
async function apiPost(body){
  if(!SCRIPT_URL||SCRIPT_URL==='YOUR_APPS_SCRIPT_URL_HERE')return;
  try{await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});}
  catch{showToast(t('t_sync'),'error');}
}
async function addDebt(d){debts.push(d);updateTotal();renderTab();await apiPost({action:'add',debt:d});}
async function markPaid(id){debts=debts.map(d=>d.id===id?{...d,paid:true}:d);updateTotal();renderTab();showToast(t('t_paid'),'ok');await apiPost({action:'paid',id});}
async function deleteDebt(id){debts=debts.filter(d=>d.id!==id);updateTotal();renderTab();showToast(t('t_del'),'info');await apiPost({action:'delete',id});}

// ── VOICE ──
async function checkMic(){
  if(location.protocol!=='https:'&&location.hostname!=='localhost'){
    showMicBanner(t('mic_https'));return false;
  }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showMicBanner(t('mic_none'));return false;}
  try{
    const s=await navigator.mediaDevices.getUserMedia({audio:true});
    s.getTracks().forEach(t=>t.stop());return true;
  }catch(e){
    if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError')showMicBanner(t('mic_denied'));
    return false;
  }
}
function showMicBanner(msg){const b=document.getElementById('mic-banner');b.innerHTML=msg;b.style.display='block';}

async function toggleListen(){
  if(isListening){recognition?.stop();return;}
  const ok=await checkMic();if(!ok)return;
  document.getElementById('mic-banner').style.display='none';
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang=lang==='tr'?'tr-TR':'en-US';
  recognition.continuous=false;recognition.interimResults=true;
  let finalText='';
  recognition.onstart=()=>{
    isListening=true;setOrb('listening');
    document.getElementById('status-msg').textContent=t('status_listen');
    document.getElementById('examples').style.display='none';
    document.getElementById('wave').classList.add('active');
  };
  recognition.onresult=e=>{
    const tx=Array.from(e.results).map(x=>x[0].transcript).join('');
    finalText=tx;
    const el=document.getElementById('transcript');el.textContent='"'+tx+'"';el.classList.add('show');
  };
  recognition.onend=()=>{
    isListening=false;document.getElementById('wave').classList.remove('active');
    if(finalText.trim())parseVoice(finalText.trim());
    else{setOrb('idle');document.getElementById('status-msg').textContent=t('status_idle');showExs();}
  };
  recognition.onerror=e=>{
    isListening=false;document.getElementById('wave').classList.remove('active');
    setOrb('idle');showExs();
    if(e.error==='not-allowed'||e.error==='permission-denied')showMicBanner(t('mic_denied'));
    else document.getElementById('status-msg').textContent=t('status_idle');
  };
  recognition.start();
}

async function parseVoice(text){
  setOrb('processing');document.getElementById('status-msg').textContent=t('status_process');
  const today=new Date().toISOString().split('T')[0];
  const eom=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).toISOString().split('T')[0];
  try{
    const res=await fetch(CLAUDE_API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
        system:'Convert voice to debt JSON. Return ONLY raw JSON, no markdown.',
        messages:[{role:'user',content:`"${text}"\nToday:${today} EOM:${eom}\n→{"type":"credit_card|cash|installment|bill|personal","creditor":"","amount":0,"currency":"₺","dueDate":"YYYY-MM-DD","recurring":false,"totalInstallments":null,"remainingInstallments":null,"note":""}`}]
      })
    });
    const data=await res.json();
    const parsed=JSON.parse((data.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
    const debt={id:String(Date.now()),...parsed,paid:false,createdAt:today};
    await addDebt(debt);
    document.getElementById('status-msg').textContent=`✓ ${parsed.creditor} — ${fmt(parsed.amount,parsed.currency)}`;
    setOrb('idle');showExs();document.getElementById('transcript').classList.remove('show');
    setTab('debts',document.getElementById('tab-debts'));
    showToast(t('t_added'),'ok');
  }catch{
    setOrb('idle');document.getElementById('status-msg').textContent=t('status_idle');showExs();
    showToast(t('t_err'),'error');
  }
}
function setOrb(state){
  const orb=document.getElementById('orb'),ic=document.getElementById('orb-icon');
  orb.className='orb';
  if(state==='listening'){orb.classList.add('listening');ic.textContent='⏹️';}
  else if(state==='processing'){orb.classList.add('processing');ic.textContent='⏳';}
  else ic.textContent='🎙️';
}
function showExs(){document.getElementById('examples').style.display='flex';}

// ── TABS ──
function setTab(name,btn){
  currentTab=name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderTab();
  if(name==='suggest'&&!suggestions)getSuggestions();
}
function renderTab(){
  const el=document.getElementById('content');
  if(currentTab==='debts')el.innerHTML=renderDebts();
  else if(currentTab==='calendar')el.innerHTML=renderCalendar();
  else el.innerHTML=renderSuggest();
}

// ── RENDER DEBTS ──
function renderDebts(){
  const l=L[lang];
  const unpaid=debts.filter(d=>!d.paid).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));
  const paid=debts.filter(d=>d.paid);
  if(!unpaid.length&&!paid.length)return`<div class="empty">${l.empty}</div>`;
  let h='';
  unpaid.forEach((d,i)=>{
    const days=daysUntil(d.dueDate),col=urgCol(days);
    const urg=days<0?`${Math.abs(days)}${l.d_over}`:days===0?l.d_today:days===1?l.d_tom:days<=3?`${days}${l.d_few}`:`${days}${l.d_more}`;
    const ti=TYPE_VALS.indexOf(d.type);
    const icon=ti>=0?l.type_icon[ti]:'💰';
    const lbl=ti>=0?l.type_lbl[ti]:d.type;
    const isLast=i===unpaid.length-1;
    h+=`<div class="timeline-item">
      <div class="tl-line">
        <div class="tl-dot" style="border-color:${col};background:${col}22"></div>
        ${!isLast?'<div class="tl-bar"></div>':''}
      </div>
      <div class="tl-card">
        <div class="tl-top">
          <div class="tl-type" style="background:${col}18;color:${col}">${icon} ${lbl}</div>
          <div class="tl-urg" style="color:${col}">${urg}</div>
        </div>
        <div class="tl-main">
          <div class="tl-creditor">${esc(d.creditor)}</div>
          <div class="tl-amount">${fmt(d.amount,d.currency)}</div>
        </div>
        <div class="tl-meta">
          <span>📅 ${d.dueDate}</span>
          ${d.recurring?`<span>${l.recur}</span>`:''}
          ${d.remainingInstallments?`<span>📦 ${d.remainingInstallments}/${d.totalInstallments} ${l.inst_lbl}</span>`:''}
        </div>
        ${d.note?`<div class="tl-note">${esc(d.note)}</div>`:''}
        <div class="tl-actions">
          <button class="btn-paid" onclick="markPaid('${d.id}')">${l.btn_paid}</button>
          <button class="btn-del" onclick="deleteDebt('${d.id}')">${l.btn_del}</button>
        </div>
      </div>
    </div>`;
  });
  if(paid.length){
    h+=`<div class="section-label">${l.paid_sec} (${paid.length})</div>`;
    paid.forEach(d=>{
      const ti=TYPE_VALS.indexOf(d.type);
      h+=`<div class="paid-row"><span>${ti>=0?l.type_icon[ti]:'💰'}</span>
        <span class="pc">${esc(d.creditor)}</span>
        <span class="pa">${fmt(d.amount,d.currency)}</span>
        <button class="btn-del" onclick="deleteDebt('${d.id}')">${l.btn_del}</button>
      </div>`;
    });
  }
  return h;
}

// ── RENDER CALENDAR ──
function renderCalendar(){
  const l=L[lang];
  const cy=calMonth.getFullYear(),cm=calMonth.getMonth();
  const firstDOW=new Date(cy,cm,1).getDay();
  const daysInM=new Date(cy,cm+1,0).getDate();
  const offset=firstDOW===0?6:firstDOW-1;
  const byDate={};
  debts.filter(d=>!d.paid).forEach(d=>{if(!byDate[d.dueDate])byDate[d.dueDate]=[];byDate[d.dueDate].push(d);});
  const todayStr=new Date().toISOString().split('T')[0];
  let h=`<div class="cal-header">
    <button class="cal-nav" onclick="calPrev()">‹</button>
    <div class="cal-title">${l.months[cm]} ${cy}</div>
    <button class="cal-nav" onclick="calNext()">›</button>
  </div><div class="cal-grid">`;
  l.days.forEach(d=>h+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<offset;i++)h+='<div></div>';
  for(let day=1;day<=daysInM;day++){
    const dk=`${cy}-${String(cm+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dd=byDate[dk]||[],isT=dk===todayStr;
    h+=`<div class="cal-day${isT?' today':''}"><div class="cal-num">${day}</div>`;
    dd.forEach(d=>{
      const col=urgCol(daysUntil(d.dueDate));
      h+=`<div class="cal-event" style="background:${col}"><span class="cal-event-txt">${fmt(d.amount,d.currency)}</span></div>`;
    });
    h+='</div>';
  }
  const cols=['#e05252','#f97316','#d4883a','#4aab7a'];
  h+=`</div><div class="cal-legend">`;
  l.cal_leg.forEach((lb,i)=>h+=`<div class="leg-item"><div class="leg-dot" style="background:${cols[i]}"></div>${lb}</div>`);
  h+='</div>';
  return h;
}
function calPrev(){calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()-1);renderTab();}
function calNext(){calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+1);renderTab();}

// ── RENDER SUGGEST ──
function renderSuggest(){
  const l=L[lang];
  let h=`<button class="sug-btn" id="sug-btn" onclick="getSuggestions()">${l.sug_btn}</button>`;
  if(!suggestions)h+=`<div id="sug-area"><div class="empty" style="padding:16px 0;font-size:12px">${l.sug_tap}</div></div>`;
  else h+=`<div id="sug-area">${buildSugBox()}</div>`;
  return h;
}
function buildSugBox(){
  const l=L[lang];
  const lines=suggestions.split('\n').filter(Boolean);
  let h=`<div class="sug-box"><div class="sug-header"><span>✦</span><span class="sug-title">${l.tab_sug}</span></div>`;
  lines.forEach(line=>{
    const head=/^[1-4]\./.test(line)||/^[🔥📅💡⚠️]/.test(line);
    h+=`<div class="sug-line${head?' head':''}">${line}</div>`;
  });
  return h+'</div>';
}
async function getSuggestions(){
  const l=L[lang];
  const unpaid=debts.filter(d=>!d.paid);
  if(!unpaid.length){suggestions=lang==='tr'?'🎉 Bekleyen borcunuz yok!':'🎉 No pending debts!';renderTab();return;}
  const btn=document.getElementById('sug-btn');
  if(btn){btn.textContent=l.sug_ing;btn.disabled=true;}
  const area=document.getElementById('sug-area');
  if(area)area.innerHTML='<div class="sug-skeleton"><div class="sug-fill"></div></div>';
  const summary=unpaid.sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate))
    .map(d=>`• ${d.type}|${d.creditor}|${fmt(d.amount,d.currency)}|${d.dueDate}|${daysUntil(d.dueDate)}d${d.remainingInstallments?`|${d.remainingInstallments}/${d.totalInstallments} inst`:''}`)
    .join('\n');
  try{
    const res=await fetch(CLAUDE_API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,
        system:l.sug_sys,
        messages:[{role:'user',content:l.sug_q.replace('{D}',summary)}]
      })
    });
    const data=await res.json();
    suggestions=data.content?.[0]?.text||'Error';
  }catch{suggestions=lang==='tr'?'Bağlantı hatası.':'Connection error.';}
  renderTab();
}

// ── MODAL ──
function openModal(){
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('m-due').value=new Date().toISOString().split('T')[0];
  document.getElementById('m-type').onchange=function(){
    document.getElementById('inst-row').style.display=this.value==='installment'?'grid':'none';
  };

function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
async function saveManual(){
  const creditor=document.getElementById('m-creditor').value.trim();
  const amount=parseFloat(document.getElementById('m-amount').value);
  const dueDate=document.getElementById('m-due').value;
  if(!creditor||!amount||!dueDate){showToast(t('t_fill'),'error');return;}
  const debt={id:String(Date.now()),
    type:document.getElementById('m-type').value,
    creditor,amount,
    currency:document.getElementById('m-currency').value,
    dueDate,recurring:false,
    totalInstallments:document.getElementById('m-total-inst').value||null,
    remainingInstallments:document.getElementById('m-rem-inst').value||null,
    note:document.getElementById('m-note').value||'',
    paid:false,createdAt:new Date().toISOString().split('T')[0]};
  await addDebt(debt);closeModal();showToast(t('t_added'),'ok');
}

// ── HELPERS ──
function daysUntil(d){const t=new Date();t.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);return Math.floor((x-t)/86400000);}
function urgCol(d){if(d<0)return'#e05252';if(d===0)return'#f97316';if(d<=3)return'#d4883a';if(d<=7)return'#c9973a';return'#4aab7a';}
function fmt(n,cur='₺'){return Number(n).toLocaleString()+' '+(cur||'₺');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function updateTotal(){
  const unpaid=debts.filter(d=>!d.paid);
  const byCur={};
  unpaid.forEach(d=>{byCur[d.currency||'₺']=(byCur[d.currency||'₺']||0)+Number(d.amount);});
  const parts=Object.entries(byCur).map(([c,a])=>Number(a).toLocaleString()+' '+c);
  document.getElementById('total-display').textContent=parts.length?parts.join(' + '):'—';
}
function showToast(msg,type='info'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.background=type==='ok'?'#2d7a52':type==='error'?'#7a2d2d':'#3a3a5c';
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);
}

  ];
}
